spring.application.name=dinosaur

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db1}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password!}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Scheduler
dinosaur.scheduler.cron=${SCHEDULER_CRON:0 */2 * * * *}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}
